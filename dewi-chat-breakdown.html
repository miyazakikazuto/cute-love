<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakdown Chat — dewi & Zaenal</title>
<style>
  :root{
    --wa-teal: #008069;
    --wa-teal-dark: #005c4b;
    --wa-bg: #efeae2;
    --bubble-left: #ffffff;
    --bubble-right: #d9fdd3;
    --text-main: #111b21;
    --text-sub: #667781;
    --pill-bg: #e1f2fb;
    --pill-text: #3d5566;
    --system-bg: rgba(255, 249, 209, 0.92);
    --system-text: #7a6a2e;
    --danger: #d9534f;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #d1d7db;
    color: var(--text-main);
  }
  .app{
    max-width: 560px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--wa-bg);
    box-shadow: 0 0 24px rgba(0,0,0,0.25);
  }

  /* Header */
  .header{
    background: var(--wa-teal);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 5;
  }
  .avatar{
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg,#f7b7d4,#f28cb1);
    display:flex; align-items:center; justify-content:center;
    font-weight:600; color:#7a2f4c; font-size:16px;
    flex-shrink:0;
  }
  .header-info{ flex:1; min-width:0; }
  .header-name{ font-weight:600; font-size:16.5px; line-height:1.2; }
  .header-sub{ font-size:12.5px; opacity:0.85; margin-top:1px; }
  .header-icons{ display:flex; gap:18px; opacity:0.9; font-size:18px; }

  /* Stats strip */
  .stats{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:1px;
    background: #cfd6d3;
    flex-shrink:0;
  }
  .stat-card{
    background: #fbfaf7;
    padding: 9px 6px;
    text-align:center;
  }
  .stat-num{ font-size:15.5px; font-weight:700; color: var(--wa-teal-dark); }
  .stat-label{ font-size:9.5px; color: var(--text-sub); text-transform:uppercase; letter-spacing:0.03em; margin-top:1px; }

  .balance-bar{
    display:flex; align-items:center; gap:8px;
    padding: 8px 16px;
    background: #fbfaf7;
    border-bottom: 1px solid #cfd6d3;
    font-size: 11.5px;
    color: var(--text-sub);
    flex-shrink:0;
  }
  .balance-track{
    flex:1; height:7px; border-radius:5px; overflow:hidden;
    background: var(--bubble-right);
    display:flex;
  }
  .balance-fill{
    height:100%; background: #b9b9bb;
  }

  /* Chat scroll area */
  .chat-scroll{
    flex:1;
    overflow-y:auto;
    padding: 10px 12px 16px;
    background-image:
      radial-gradient(circle at 20% 15%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.02) 0, transparent 40%);
  }

  .date-divider{
    display:flex; justify-content:center; margin: 14px 0 10px;
  }
  .date-pill{
    background: var(--pill-bg);
    color: var(--pill-text);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 8px;
  }

  .system-msg{
    display:flex; justify-content:center; margin: 8px 0;
  }
  .system-pill{
    background: var(--system-bg);
    color: var(--system-text);
    font-size: 11.5px;
    text-align:center;
    padding: 6px 12px;
    border-radius: 8px;
    max-width: 85%;
    line-height:1.4;
  }

  .row{
    display:flex;
    margin: 2px 0;
  }
  .row.left{ justify-content:flex-start; }
  .row.right{ justify-content:flex-end; }

  .bubble{
    max-width: 76%;
    padding: 6px 9px 5px 9px;
    border-radius: 8px;
    position:relative;
    font-size: 14.3px;
    line-height:1.4;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .row.left .bubble{ background: var(--bubble-left); border-top-left-radius:2px; }
  .row.right .bubble{ background: var(--bubble-right); border-top-right-radius:2px; }

  .bubble-text{ display:block; }
  .meta{
    display:flex; justify-content:flex-end; align-items:center; gap:3px;
    font-size: 10.5px; color: var(--text-sub);
    margin-top:2px;
    float:right;
    margin-left: 8px;
    transform: translateY(4px);
  }
  .edited-tag{ font-style:italic; opacity:0.8; margin-right:2px; }
  .ticks{ color:#53bdeb; font-size:12px; margin-left:1px; }

  .media-box{
    display:flex; align-items:center; gap:8px;
    background: rgba(0,0,0,0.035);
    border-radius:6px;
    padding: 8px 10px;
    margin-bottom: 3px;
  }
  .media-icon{ font-size:20px; }
  .media-label{ font-size:13px; color: var(--text-sub); font-style:italic; }

  .call-row{ display:flex; justify-content:center; margin: 6px 0; }
  .call-chip{
    display:flex; align-items:center; gap:6px;
    background: #ffffffcc;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12.5px;
    color: var(--text-sub);
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.1);
  }
  .call-chip.missed{ color: var(--danger); }
  .call-icon{ font-size:14px; }

  /* Search */
  .search-wrap{
    padding: 8px 12px;
    background: #fbfaf7;
    border-bottom: 1px solid #cfd6d3;
    flex-shrink:0;
  }
  .search-input{
    width:100%;
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #d7dbd6;
    background: #fff;
    font-size: 13.5px;
    outline:none;
  }
  .search-input:focus{ border-color: var(--wa-teal); }
  .no-result{
    text-align:center; color: var(--text-sub); font-size:13px; padding: 30px 10px;
  }
  .hidden{ display:none !important; }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background: #b8bdb9; border-radius:3px; }
</style>
</head>

</div>

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function buildStats(){
  const total = MESSAGES.length;
  const dewiCount = MESSAGES.filter(m => m.sender === 'dewi' && m.type !== 'system').length;
  const zayCount = MESSAGES.filter(m => m.sender === 'Zaenal' && m.type !== 'system').length;
  const mediaCount = MESSAGES.filter(m => m.type === 'media').length;
  const calls = MESSAGES.filter(m => m.type === 'call');
  const missedCount = calls.filter(m => m.text.startsWith('Missed')).length;
  const activeDays = new Set(MESSAGES.map(m => m.raw_date)).size;

  const firstDate = MESSAGES[0].date;
  const lastDate = MESSAGES[MESSAGES.length - 1].date;

  document.getElementById('header-sub').textContent =
    `${total} pesan · ${activeDays} hari aktif · ${firstDate} – ${lastDate}`;

  const statsHtml = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total pesan</div></div>
    <div class="stat-card"><div class="stat-num">${mediaCount}</div><div class="stat-label">Media</div></div>
    <div class="stat-card"><div class="stat-num">${calls.length}</div><div class="stat-label">Panggilan</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${missedCount ? '#d9534f' : '#008069'}">${missedCount}</div><div class="stat-label">Missed call</div></div>
  `;
  document.getElementById('stats-strip').innerHTML = statsHtml;

  const dewiPct = Math.round((dewiCount / (dewiCount + zayCount)) * 100);
  const zayPct = 100 - dewiPct;
  document.getElementById('balance-left-label').textContent = `dewi ${dewiPct}% (${dewiCount})`;
  document.getElementById('balance-right-label').textContent = `Zaenal ${zayPct}% (${zayCount})`;
  document.getElementById('balance-fill').style.width = zayPct + '%';
  document.getElementById('balance-fill').style.marginLeft = 'auto';
}

function callChip(m){
  const missed = m.text.startsWith('Missed');
  const silenced = m.text.startsWith('Silenced');
  const icon = missed ? '📵' : '📞';
  let label = m.text.replace(/^(Missed voice call\.|Silenced voice call\.|Voice call\.|Missed video call\.|Silenced video call\.|Video call\.)\s*/, '');
  let prefix = 'Panggilan suara';
  if (m.text.includes('video')) prefix = 'Panggilan video';
  if (missed) prefix = 'Panggilan tak terjawab';
  if (silenced) prefix = 'Panggilan (mode senyap)';
  const cls = missed ? 'call-chip missed' : 'call-chip';
  const detail = label ? ` · ${escapeHtml(label)}` : '';
  return `<div class="call-row"><div class="${cls}"><span class="call-icon">${icon}</span>${prefix}${detail} · ${m.time}</div></div>`;
}

function renderMessage(m){
  if (m.type === 'system'){
    return `<div class="system-msg"><div class="system-pill">${escapeHtml(m.text)}</div></div>`;
  }
  if (m.type === 'call'){
    return callChip(m);
  }

  const side = m.sender === 'dewi' ? 'left' : 'right';
  const editedTag = m.edited ? '<span class="edited-tag">diedit</span>' : '';
  const ticks = side === 'right' ? '<span class="ticks">✓✓</span>' : '';

  let inner = '';
  if (m.type === 'media'){
    inner += `<div class="media-box"><span class="media-icon">${m.icon}</span><span class="media-label">${m.label}</span></div>`;
    if (m.caption){
      inner += `<span class="bubble-text">${escapeHtml(m.caption)}</span>`;
    }
  } else {
    inner += `<span class="bubble-text">${escapeHtml(m.text)}</span>`;
  }
  inner += `<span class="meta">${editedTag}${m.time}${ticks}</span>`;

  return `<div class="row ${side}" data-search="${escapeHtml((m.text||'') + ' ' + (m.caption||'')).toLowerCase()}"><div class="bubble">${inner}</div></div>`;
}

function renderChat(){
  let html = '';
  let lastDate = null;
  MESSAGES.forEach(m => {
    if (m.date !== lastDate){
      html += `<div class="date-divider"><div class="date-pill">${m.date}</div></div>`;
      lastDate = m.date;
    }
    html += renderMessage(m);
  });
  document.getElementById('chatContent').innerHTML = html;
}

function setupSearch(){
  const input = document.getElementById('searchInput');
  const scroll = document.getElementById('chatScroll');
  const content = document.getElementById('chatContent');
  const noResult = document.getElementById('noResult');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    const rows = content.querySelectorAll('.row');
    const dividers = content.querySelectorAll('.date-divider, .system-msg, .call-row');

    if (!q){
      rows.forEach(r => r.classList.remove('hidden'));
      dividers.forEach(d => d.classList.remove('hidden'));
      noResult.classList.add('hidden');
      return;
    }

    dividers.forEach(d => d.classList.add('hidden'));
    let anyMatch = false;
    rows.forEach(r => {
      const match = (r.getAttribute('data-search') || '').includes(q);
      r.classList.toggle('hidden', !match);
      if (match) anyMatch = true;
    });
    noResult.classList.toggle('hidden', anyMatch);
  });
}

buildStats();
renderChat();
